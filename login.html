<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akın - Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Navigasyon Çubuğu -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Akın'ın Portfolyosu</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgialanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link active" href="login.html">Giriş Yap</a></li>
					
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Sisteme Giriş</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <!-- Hata Mesajları İçin Uyarı Alanları -->
                        <div id="js-error" class="alert alert-danger d-none"></div>
                        <div id="php-error" class="alert alert-warning d-none"></div>

                        <form id="loginForm" action="login.php" method="POST">
                            <div class="mb-3">
                                <label for="email" class="form-label">E-Posta (Kullanıcı Adı)</label>
                                <input type="text" class="form-control" id="email" name="email" placeholder="b1912b10030@sakarya.edu.tr">
                            </div>
                            <div class="mb-4">
                                <label for="sifre" class="form-label">Şifre (Öğrenci No)</label>
                                <input type="password" class="form-control" id="sifre" name="sifre" placeholder="Şifrenizi giriniz">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container"><small>&copy; 2026 Akın | Web Teknolojileri Projesi</small></div>
    </footer>

    <!-- Form Kontrolü ve Yönlendirme Yakalama (JavaScript) -->
    <script>
        // 1. JS ile Boş Alan ve Email Formatı Kontrolü
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            const email = document.getElementById('email').value.trim();
            const sifre = document.getElementById('sifre').value.trim();
            const errorDiv = document.getElementById('js-error');
            const phpErrorDiv = document.getElementById('php-error');
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            phpErrorDiv.classList.add('d-none'); // Eski PHP hatalarını gizle

            if (email === '' || sifre === '') {
                event.preventDefault(); // Formun gitmesini engelle
                errorDiv.textContent = 'Lütfen e-posta ve şifre alanlarını boş bırakmayınız.';
                errorDiv.classList.remove('d-none');
            } else if (!emailRegex.test(email)) {
                event.preventDefault();
                errorDiv.textContent = 'Lütfen geçerli bir e-posta formatı giriniz.';
                errorDiv.classList.remove('d-none');
            } else {
                errorDiv.classList.add('d-none');
            }
        });

        // 2. PHP'den Gelen Yönlendirme (Hata) Mesajlarını Yakalama
        const urlParams = new URLSearchParams(window.location.search);
        const phpError = document.getElementById('php-error');
        
        if (urlParams.get('error') === 'wrong') {
            phpError.textContent = 'Kullanıcı adı veya şifre hatalı!';
            phpError.classList.remove('d-none');
        } else if (urlParams.get('error') === 'empty') {
            phpError.textContent = 'Sunucu Hatası: Lütfen bilgileri eksiksiz gönderiniz.';
            phpError.classList.remove('d-none');
        }
    </script>
</body>
</html>
