<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akın - İletişim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Vue 3 Kütüphanesi -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Navigasyon Çubuğu -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Akın'ın Portfolyosu</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgialanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5" id="vue-app">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h2 class="mb-4 border-bottom pb-2 text-primary">İletişim Formu</h2>
                        
                        <!-- Hata Mesajlarının Gösterileceği Alan -->
                        <div id="error-message" class="alert d-none"></div>

                        <!-- Form (Sunucu tarafına iletisim_sonuc.php'ye gidecek) -->
                        <form id="contactForm" action="iletisim_sonuc.php" method="POST">
                            
                            <!-- Ad Soyad (Text) -->
                            <div class="mb-3">
                                <label for="isim" class="form-label">Adınız Soyadınız</label>
                                <input type="text" class="form-control" id="isim" name="isim" v-model="form.isim">
                            </div>

                            <!-- E-Posta -->
                            <div class="mb-3">
                                <label for="email" class="form-label">E-Posta Adresiniz</label>
                                <input type="text" class="form-control" id="email" name="email" placeholder="ornek@mail.com" v-model="form.email">
                            </div>

                            <!-- Telefon -->
                            <div class="mb-3">
                                <label for="telefon" class="form-label">Telefon Numaranız</label>
                                <input type="text" class="form-control" id="telefon" name="telefon" placeholder="Sadece rakam giriniz" v-model="form.telefon">
                            </div>

                            <!-- Konu (Select) -->
                            <div class="mb-3">
                                <label for="konu" class="form-label">İletişim Nedeni</label>
                                <select class="form-select" id="konu" name="konu" v-model="form.konu">
                                    <option value="">Lütfen seçiniz...</option>
                                    <option value="Oyun Geliştirme (Unity)">Oyun Geliştirme (Unity)</option>
                                    <option value="İş Birliği">İş Birliği</option>
                                    <option value="Diğer">Diğer</option>
                                </select>
                            </div>

                            <!-- Cinsiyet (Radio) -->
                            <div class="mb-3">
                                <label class="form-label d-block">Cinsiyet</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="form.cinsiyet">
                                    <label class="form-check-label" for="erkek">Erkek</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın" v-model="form.cinsiyet">
                                    <label class="form-check-label" for="kadin">Kadın</label>
                                </div>
                            </div>

                            <!-- Onay (Checkbox) -->
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="onay" name="onay" v-model="form.onay">
                                <label class="form-check-label" for="onay">Bilgilerimin doğruluğunu onaylıyorum.</label>
                            </div>

                            <!-- İki Farklı Doğrulama Butonu -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-start mt-4 border-top pt-3">
                                <button type="button" class="btn btn-dark px-4" onclick="validateNative()">Native JS ile Gönder</button>
                                <button type="button" class="btn btn-success px-4" @click="validateVue">Vue.js ile Gönder</button>
                                <button type="reset" class="btn btn-outline-secondary px-4">Temizle</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container"><small>&copy; 2026 Akın | Web Teknolojileri Projesi</small></div>
    </footer>

    <!-- Doğrulama Scriptleri -->
    <script>
        // 1. NATIVE JAVASCRIPT DOĞRULAMASI
        function validateNative() {
            const errorDiv = document.getElementById('error-message');
            const isim = document.getElementById('isim').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefon = document.getElementById('telefon').value.trim();
            const konu = document.getElementById('konu').value;
            const erkek = document.getElementById('erkek').checked;
            const kadin = document.getElementById('kadin').checked;
            const onay = document.getElementById('onay').checked;

            let errors = [];

            if(isim === '') errors.push('- İsim alanı boş bırakılamaz.');
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(email === '' || !emailRegex.test(email)) errors.push('- Geçerli bir e-posta adresi giriniz.');

            const telRegex = /^[0-9]+$/;
            if(telefon === '' || !telRegex.test(telefon)) errors.push('- Telefon numarası sadece rakamlardan oluşmalıdır.');

            if(konu === '') errors.push('- Lütfen bir konu seçiniz.');
            if(!erkek && !kadin) errors.push('- Lütfen cinsiyet seçimi yapınız.');
            if(!onay) errors.push('- Devam etmek için bilgileri onaylamalısınız.');

            if(errors.length > 0) {
                errorDiv.innerHTML = "<strong>Native JS Hatası:</strong> Lütfen aşağıdaki alanları düzeltin.<br>" + errors.join('<br>');
                errorDiv.className = 'alert alert-danger';
            } else {
                errorDiv.className = 'd-none';
                document.getElementById('contactForm').submit();
            }
        }

        // 2. VUE.JS (FRAMEWORK) DOĞRULAMASI
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    form: { isim: '', email: '', telefon: '', konu: '', cinsiyet: '', onay: false }
                }
            },
            methods: {
                validateVue() {
                    const errorDiv = document.getElementById('error-message');
                    let errors = [];
                    
                    if(this.form.isim.trim() === '') errors.push('- İsim alanını doldurunuz.');
                    
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if(this.form.email.trim() === '' || !emailRegex.test(this.form.email)) errors.push('- Lütfen formata uygun bir e-posta girin.');

                    const telRegex = /^[0-9]+$/;
                    if(this.form.telefon.trim() === '' || !telRegex.test(this.form.telefon)) errors.push('- Telefon formatı hatalı (Sadece rakam).');

                    if(this.form.konu === '') errors.push('- Konu alanını boş geçemezsiniz.');
                    if(this.form.cinsiyet === '') errors.push('- Cinsiyet seçimi yapmadınız.');
                    if(!this.form.onay) errors.push('- Onay kutusu işaretlenmelidir.');

                    if(errors.length > 0) {
                        errorDiv.innerHTML = "<strong>Vue.js Hatası:</strong> Eksik alanlar tespit edildi.<br>" + errors.join('<br>');
                        errorDiv.className = 'alert alert-warning text-dark'; // Vue'dan geldiği anlaşılsın diye sarı renk kullanilmitir.
                    } else {
                        errorDiv.className = 'd-none';
                        document.getElementById('contactForm').submit();
                    }
                }
            }
        }).mount('#vue-app');
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
